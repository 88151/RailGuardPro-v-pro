<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RailGuardPro v3 Pro | Working Time Table</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="logo">

🚆 RailGuardPro v3 Pro

</div>

<div>

<a href="dashboard.html">
<button>🏠 Dashboard</button>
</a>

<a href="login.html">
<button>Logout</button>
</a>

</div>

</header>

<section class="container">

<h1>📄 Working Time Table (WTT)</h1>

<p>

Upload Railway Working Time Table PDF and Automatically Generate Running Information.

</p>

<hr>

<h2>📤 Upload Railway Working Time Table</h2>

<input
type="file"
id="wttFile"
accept=".pdf">

<button onclick="uploadWTT()">

Upload WTT PDF

</button>

<hr>

<h2>🚆 Search Train</h2>

<input
type="text"
id="trainNumber"
placeholder="Enter Train Number">

<button onclick="searchTrain()">

Search Train

</button>

<hr>

<h2>📋 Train Information</h2>

<label>Train Name</label>

<input type="text" id="trainName">

<label>Section</label>

<input type="text" id="section">

<label>Origin Station</label>

<input type="text" id="origin">

<label>Destination Station</label>

<input type="text" id="destination">

<label>Total Distance (KM)</label>

<input type="number" id="distance">

<label>Maximum Speed</label>

<input type="number" id="speed">

<label>Total Running Time</label>

<input type="text" id="runningTime">
